server {
    listen 80;
    listen [::]:80;
    server_name starandstream.com;

    # Let's Encrypt webroot for validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    http2 on;
    
    server_name starandstream.com;

    # SSL configuration (Certbot paths within container)
    ssl_certificate /etc/letsencrypt/live/starandstream.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/starandstream.com/privkey.pem;

    # HTTP/3 headers
    add_header Alt-Svc 'h3=":443"; ma=86400';
    add_header x-quic 'h3';

    # Map to the www directory mounted inside the Nginx container (client side of Astro)
    root /var/www/starandstream.com/client;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Proxy API and dynamic routes to Astro server container
    location / {
        proxy_pass http://starandstream:4322;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # Cache static assets
    location ~* \.(?:css|js|jpg|svg|png|gif|ico|webp|woff2?)$ {
        root /var/www/starandstream.com/client;
        expires 1y;
        add_header Cache-Control "public";
        try_files $uri @proxy;
    }

    location @proxy {
        proxy_pass http://starandstream:4322;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }
}