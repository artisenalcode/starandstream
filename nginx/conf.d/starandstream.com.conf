server {
    listen 80;
    listen [::]:80;
    server_name starandstream.com;
    server_tokens off;

    # Let's Encrypt webroot for validation
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP requests to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    listen 443 quic;
    listen [::]:443 quic;
    http2 on;

    server_name starandstream.com;
    server_tokens off;

    # SSL configuration (Certbot paths within container)
    ssl_certificate /etc/letsencrypt/live/starandstream.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/starandstream.com/privkey.pem;

    # TLS hardening
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_cache shared:SSLsas:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # Security headers. Defined once here so they are inherited by every location
    # that declares no add_header of its own (nginx drops inherited add_headers in
    # any block that sets its own — so the cache blocks below use only `expires`).
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; img-src 'self' data:; font-src 'self' https://fonts.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'wasm-unsafe-eval' https://challenges.cloudflare.com __CSP_SCRIPT_HASHES__; connect-src 'self'; frame-src https://challenges.cloudflare.com; upgrade-insecure-requests" always;
    add_header Alt-Svc 'h3=":443"; ma=86400' always;
    add_header x-quic 'h3' always;

    # Map to the www directory mounted inside the Nginx container (client side of Astro)
    root /var/www/starandstream.com;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript application/json image/svg+xml application/manifest+json;
    gzip_disable "MSIE [1-6]\.";

    # HTML documents: always revalidate (ETag) so content updates go live immediately.
    location / {
        try_files $uri $uri/ /index.html =404;
        expires epoch;
    }

    # Proxy contact and register submissions to the central form-api container.
    # Exact-match locations (not a regex) so proxy_pass can carry the /submit URI —
    # a regex location forbids a URI part in proxy_pass.
    location = /api/contact {
        proxy_pass http://form-api:3000/submit/starandstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }
    location = /api/register {
        proxy_pass http://form-api:3000/submit/starandstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
        proxy_http_version 1.1;
    }

    # Hashed, content-addressed build assets — cache hard for a year (`^~` wins
    # over the regex block below).
    location ^~ /_astro/ {
        expires 1y;
        access_log off;
    }

    # Other static assets (public/ images, fonts) keep stable filenames, so cache
    # only briefly and let ETag revalidation serve 304s. This is what stops a
    # replaced-in-place image from staying stale for a year.
    location ~* \.(?:css|js|mjs|jpg|jpeg|png|gif|svg|ico|webp|avif|woff2?|ttf|otf|eot|mp4)$ {
        expires 1h;
        access_log off;
        try_files $uri =404;
    }
}
