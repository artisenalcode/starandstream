name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  version:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Bump patch version, tag, publish release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          VERSION=$(npm version patch --no-git-tag-version)
          git commit -am "chore(release): $VERSION"
          # Annotated tag: --follow-tags only pushes annotated tags.
          git tag -a "$VERSION" -m "$VERSION"
          git push origin main --follow-tags
          # Release notes auto-generated from commits since the last release.
          gh release create "$VERSION" --generate-notes --title "$VERSION"

  deploy:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - name: Execute remote ssh commands to deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 85.239.232.124
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Fail the job on any error instead of silently shipping a stale build
            set -e

            # Navigate to the target directory
            mkdir -p /data/code/starandstream.com
            cd /data/code/starandstream.com

            # Clone if this isn't a git repo yet
            if [ ! -d ".git" ]; then
                git clone git@github.com:artisenalcode/starandstream.git .
            fi

            # Force-sync to origin/main. fetch + reset (instead of `git pull`)
            # guarantees the VPS matches the repo even if the working tree is dirty
            # or stuck in a merge conflict — a plain pull fails on those and rebuilds
            # old code. .env and node_modules are gitignored so they survive clean.
            git merge --abort 2>/dev/null || true
            git fetch --prune origin main
            git reset --hard origin/main
            git clean -fd

            # Refresh the encrypted secrets store and render /data/env/*.env,
            # which form-api mounts. The age private key exists only on this
            # box, so GitHub Actions never handles plaintext credentials.
            export PATH="$HOME/.local/bin:$PATH"
            git -C /data/secrets fetch --prune origin
            git -C /data/secrets reset --hard origin/master
            /data/secrets/render.sh /data/env

            # Drop the repo-root .env left behind by the old VPS_ENV_FILE flow.
            # This static build needs only PUBLIC_TURNSTILE_SITE_KEY, which is
            # committed in .env.production.
            rm -f .env

            # Setup bun environment (assuming it was installed for the dev user)
            export PATH="$HOME/.bun/bin:$PATH"

            # Build project natively using Bun
            bun install && bun run build

            # Create the Nginx www directory if it doesn't exist
            mkdir -p /data/nginx/www/starandstream.com

            # Sync the built static files to the Nginx www directory
            rsync -avz --delete dist/ /data/nginx/www/starandstream.com/

            # Render the Nginx config: inject CSP hashes for the built inline
            # scripts, then write it to the global conf.d directory. Fails the
            # deploy (set -e) if no inline scripts are found, rather than shipping
            # a CSP that would block the site's own scripts.
            bun scripts/inject-csp-hashes.mjs \
                nginx/conf.d/starandstream.com.conf \
                /data/nginx/conf.d/starandstream.com.conf

            # Attempt to request a certificate if it doesn't already exist
            if [ ! -d "/data/certbot/conf/live/starandstream.com" ]; then
                podman exec certbot certbot certonly --webroot -w /var/www/certbot -d starandstream.com --non-interactive --agree-tos -m contact@starandstream.com || true
            fi

            # Attempt certificate renewal (no-op if still valid). No --deploy-hook:
            # the hook would run inside the certbot container, which has no podman,
            # so it always errored. The explicit reload below applies a renewed cert.
            podman exec certbot certbot renew --webroot -w /var/www/certbot --non-interactive || true

            # Reload Nginx to apply changes, retrying briefly. A concurrent deploy
            # recreating a container on nginx-net can perturb the podman network DNS
            # (aardvark) and make an immediate reload transiently fail to resolve
            # upstreams like form-api. Retry until DNS settles; fail only on a real
            # config error.
            for attempt in 1 2 3 4 5; do
                if podman exec nginx nginx -t >/dev/null 2>&1 \
                    && podman exec nginx nginx -s reload 2>/dev/null; then
                    echo "nginx reloaded (attempt $attempt)"
                    break
                fi
                if [ "$attempt" = 5 ]; then
                    echo "nginx reload still failing after retries; real error:" >&2
                    podman exec nginx nginx -t
                    exit 1
                fi
                sleep 3
            done
